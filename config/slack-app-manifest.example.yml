display_information:
  name: Job Search OS
features:
  bot_user:
    display_name: Job Search OS
    always_online: true
  slash_commands:
    - command: /jso
      description: Show Job Search OS status
      usage_hint: status
      should_escape: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:read
      - chat:write
      - commands
      - groups:read
settings:
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
