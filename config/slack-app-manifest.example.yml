display_information:
  name: Job Search OS
features:
  bot_user:
    display_name: Job Search OS
    always_online: true
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
    messages_tab_read_only_enabled: true
  slash_commands:
    - command: /jso
      description: Open Job Search OS status, approvals, briefings, rooms, and safe starters
      usage_hint: status | approvals | runs | morning | evening | focus | opportunity <id> | coach summary | run jolene | run loop | run search-team | help
      should_escape: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - commands
      - groups:history
      - groups:read
settings:
  event_subscriptions:
    bot_events:
      - app_home_opened
      - message.channels
      - message.groups
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
