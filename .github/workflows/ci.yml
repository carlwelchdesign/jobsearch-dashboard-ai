name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_search_os
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d job_search_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/job_search_os?schema=public
      SEED_USER_EMAIL: ci@example.com
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CRON_SECRET: ci-cron-secret
      EMAIL_SYNC_SECRET: ci-email-secret
      REQUIRE_CRON_SECRETS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Lint
        run: npm run lint

      - name: Run unit and route tests
        run: npm run test

      - name: Typecheck
        run: npx tsc --noEmit --pretty false

      - name: Build
        run: npm run build

      - name: Migrate and seed smoke database
        run: |
          npx prisma migrate deploy
          npx prisma db seed

      - name: Smoke pages
        run: |
          npm run start > /tmp/job-search-os.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/dashboard >/dev/null; then
              break
            fi
            sleep 2
          done
          npm run smoke:pages
