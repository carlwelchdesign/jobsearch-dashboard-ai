
name: React Doctor

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # required for `diff`
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Run React Doctor
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            npm exec --yes --package react-doctor@latest -- react-doctor . --diff "origin/${BASE_REF}" --blocking none
          else
            npm exec --yes --package react-doctor@latest -- react-doctor . --blocking none
          fi
