services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: job-search-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_search_os
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_search_os"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    profiles: ["worker", "full"]
    image: redis:7-alpine
    container_name: job-search-os-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    profiles: ["app", "full"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-search-os-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_search_os?schema=public
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CRON_SECRET: ${CRON_SECRET:-}
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    command: sh -c "npm run prisma:migrate:deploy && npm start"

  worker:
    profiles: ["worker", "full"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-search-os-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_search_os?schema=public
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      REDIS_URL: redis://redis:6379
      EMBEDDINGS_WORKER_INTERVAL_MS: ${EMBEDDINGS_WORKER_INTERVAL_MS:-600000}
      EMBEDDINGS_WORKER_BATCH_SIZE: ${EMBEDDINGS_WORKER_BATCH_SIZE:-50}
      EMBEDDINGS_WORKER_BACKFILL_EVIDENCE: ${EMBEDDINGS_WORKER_BACKFILL_EVIDENCE:-false}
    command: sh -c "npm run prisma:migrate:deploy && npm run worker:embeddings"

  mcp:
    profiles: ["mcp"]
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: job-search-os-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_search_os?schema=public
      JOB_SEARCH_OS_APP_URL: ${JOB_SEARCH_OS_APP_URL:-http://host.docker.internal:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    stdin_open: true

volumes:
  postgres-data:
